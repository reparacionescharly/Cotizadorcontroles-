<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador - Controles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* =========================================
       VARIABLES Y RESET
       ========================================= */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #050505;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0000 0%, #020202 70%),
            repeating-linear-gradient(45deg, #000 0%, #000 2px, #050505 2px, #050505 4px);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
    }

    .text-metal-silver {
        background: linear-gradient(180deg, #f8f9fa 0%, #adb5bd 40%, #495057 50%, #ced4da 60%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    .text-metal-red {
        background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 40%, #660000 50%, #b30000 60%, #ff1a1a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .neon-text-red {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(204, 0, 0, 0.4);
    }

    .header-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .header-logo img {
        width: 350px;
        max-width: 90vw;
        filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
    }

    .panel-metal {
        background: linear-gradient(145deg, #151515 0%, #080808 100%);
        border: 2px solid #550000;
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 850px; 
        box-shadow: 
            0 0 20px rgba(255, 0, 0, 0.3),
            inset 0 0 15px rgba(255, 0, 0, 0.1),
            10px 10px 30px rgba(0, 0, 0, 0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        align-items: center;
    }

    .panel-header {
        grid-column: 1 / -1; 
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        padding-bottom: 15px;
    }

    .left-col {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .console-img {
        width: 250px;
        max-width: 100%;
        transition: transform 0.4s ease, filter 0.4s ease, opacity 0.3s ease;
        filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9)) drop-shadow(0 0 25px rgba(255, 0, 0, 0.6));
    }

    .console-img:hover {
        transform: scale(1.1) translateY(-10px);
        filter: drop-shadow(0 25px 25px rgba(0,0,0,0.9)) drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
    }

    .right-col {
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }

    .form-group {
        text-align: left;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 1.5px;
        margin-bottom: 0.8rem;
        display: block;
    }

    .metal-dropdown {
        width: 100%;
        padding: 14px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e0e0e0;
        background: linear-gradient(to bottom, #262626 0%, #111 100%);
        border: 1px solid #444;
        border-left: 3px solid #cc0000; 
        border-radius: 8px;
        appearance: none;
        outline: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4d4d' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
        transition: all 0.3s ease;
    }

    .metal-dropdown:focus, .metal-dropdown:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 5px rgba(255,0,0,0.2);
    }

    .precio-container {
        text-align: center;
        margin-top: 5px;
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        padding: 15px;
        border: 1px solid rgba(255, 0, 0, 0.2);
    }

    .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-wa {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #1a0000, #000000);
        border: 2px solid #cc0000;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255,0,0,0.3), 0 5px 15px rgba(0,0,0,0.8);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .btn-wa svg {
        width: 24px;
        height: 24px;
        fill: #ff4d4d;
        transition: all 0.3s ease;
    }

    .btn-wa:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 25px rgba(255,0,0,0.7), 0 10px 20px rgba(0,0,0,0.8);
        transform: translateY(-3px);
    }
