<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador - Controles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* =========================================
       VARIABLES Y RESET
       ========================================= */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Montserrat', sans-serif;
    }

    body {
        background-color: #050505;
        background-image: 
            radial-gradient(circle at 50% 0%, #1a0000 0%, #020202 70%),
            repeating-linear-gradient(45deg, #000 0%, #000 2px, #050505 2px, #050505 4px);
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
    }

    .text-metal-silver {
        background: linear-gradient(180deg, #f8f9fa 0%, #adb5bd 40%, #495057 50%, #ced4da 60%, #ffffff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.8));
    }

    .text-metal-red {
        background: linear-gradient(180deg, #ff4d4d 0%, #cc0000 40%, #660000 50%, #b30000 60%, #ff1a1a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }

    .neon-text-red {
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.6), 0 0 25px rgba(204, 0, 0, 0.4);
    }

    .header-logo {
        text-align: center;
        margin-bottom: 2rem;
    }

    .header-logo img {
        width: 350px;
        max-width: 90vw;
        filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.4));
    }

    .panel-metal {
        background: linear-gradient(145deg, #151515 0%, #080808 100%);
        border: 2px solid #550000;
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 850px; 
        box-shadow: 
            0 0 20px rgba(255, 0, 0, 0.3),
            inset 0 0 15px rgba(255, 0, 0, 0.1),
            10px 10px 30px rgba(0, 0, 0, 0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        align-items: center;
    }

    .panel-header {
        grid-column: 1 / -1; 
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 0, 0, 0.2);
        padding-bottom: 15px;
    }

    .left-col {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .console-img {
        width: 250px;
        max-width: 100%;
        transition: transform 0.4s ease, filter 0.4s ease, opacity 0.3s ease;
        filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9)) drop-shadow(0 0 25px rgba(255, 0, 0, 0.6));
    }

    .console-img:hover {
        transform: scale(1.1) translateY(-10px);
        filter: drop-shadow(0 25px 25px rgba(0,0,0,0.9)) drop-shadow(0 0 40px rgba(255, 0, 0, 0.9));
    }

    .right-col {
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }

    .form-group {
        text-align: left;
    }

    .form-group label {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 1.5px;
        margin-bottom: 0.8rem;
        display: block;
    }

    .metal-dropdown {
        width: 100%;
        padding: 14px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #e0e0e0;
        background: linear-gradient(to bottom, #262626 0%, #111 100%);
        border: 1px solid #444;
        border-left: 3px solid #cc0000; 
        border-radius: 8px;
        appearance: none;
        outline: none;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4d4d' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 15px center;
        background-size: 16px;
        transition: all 0.3s ease;
    }

    .metal-dropdown:focus, .metal-dropdown:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 5px rgba(255,0,0,0.2);
    }

    .precio-container {
        text-align: center;
        margin-top: 5px;
        background: rgba(0,0,0,0.5);
        border-radius: 8px;
        padding: 15px;
        border: 1px solid rgba(255, 0, 0, 0.2);
    }

    .action-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .btn-wa {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #1a0000, #000000);
        border: 2px solid #cc0000;
        border-radius: 10px;
        color: #fff;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(255,0,0,0.3), 0 5px 15px rgba(0,0,0,0.8);
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
    }

    .btn-wa svg {
        width: 24px;
        height: 24px;
        fill: url(#red-metal-grad);
        transition: all 0.3s ease;
    }

    .btn-wa:hover {
        border-color: #ff1a1a;
        box-shadow: 0 0 25px rgba(255,0,0,0.7), 0 10px 20px rgba(0,0,0,0.8);
        transform: translateY(-3px);
    }
    
    .btn-wa:hover svg {
        transform: scale(1.1) rotate(10deg);
    }

    .btn-secondary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #111, #050505);
        border: 1px solid #444;
        border-radius: 10px;
        color: #ccc;
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-decoration: none;
    }

    .btn-secondary:hover {
        border-color: #ff4d4d;
        color: #fff;
        box-shadow: 0 0 15px rgba(255,0,0,0.3);
        transform: translateY(-2px);
    }

    .info-panel {
        background: linear-gradient(145deg, #121212 0%, #050505 100%);
        border: 1px solid #330000;
        border-radius: 15px;
        padding: 20px;
        width: 100%;
        max-width: 850px;
        margin-top: 30px;
        box-shadow: 0 0 20px rgba(0,0,0,0.9);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .info-card {
        background: rgba(0,0,0,0.6);
        border: 1px solid #2a0000;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .info-card:hover {
        border-color: #550000;
        box-shadow: inset 0 0 15px rgba(255,0,0,0.05);
    }

    .info-card h3 { 
        color: #ff4d4d; 
        font-size: 0.95rem; 
        margin-bottom: 12px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }

    .info-card p, .info-card a { 
        color: #cccccc; 
        font-size: 0.85rem; 
        text-decoration: none; 
        display: block; 
        margin-bottom: 6px;
        line-height: 1.4;
    }

    .info-card a:hover { 
        color: #ffffff; 
        text-shadow: 0 0 8px rgba(255,26,26,0.8); 
    }

    .social-links { 
        display: flex; 
        justify-content: center; 
        gap: 20px; 
        margin-top: 15px; 
    }

    .social-links a {
        font-size: 1rem;
        font-weight: 700;
        color: #ff4d4d;
        border-bottom: 1px solid transparent;
        padding-bottom: 2px;
    }

    .social-links a:hover {
        color: #fff;
        border-bottom: 1px solid #ff1a1a;
    }

    .pago-numero {
        font-size: 1.1rem !important;
        font-weight: bold;
        color: #fff !important;
        letter-spacing: 2px;
        margin: 10px 0 !important;
    }

    @media(max-width: 700px) {
        .panel-metal, .info-panel { grid-template-columns: 1fr; gap: 20px; padding: 1.5rem; }
        .console-img { width: 180px; }
    }
</style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="red-metal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4d4d" />
                <stop offset="50%" style="stop-color:#b30000" />
                <stop offset="100%" style="stop-color:#ff1a1a" />
            </linearGradient>
        </defs>
    </svg>

    <header class="header-logo">
        <img src="logo1.png" alt="Logo de la Empresa">
    </header>

    <main class="panel-metal">
        <div class="panel-header">
            <h1 class="text-metal-silver" style="font-size: 1.1rem; margin-bottom: 5px;">Recepción de Equipos</h1>
            <p class="text-metal-red neon-text-red" style="font-size: 1rem; font-weight: 700;">Servicio Técnico de Controles</p>
        </div>

        <div class="left-col">
            <img id="deviceImg" class="console-img" src="xbox-one.png" alt="Mando">
        </div>

        <div class="right-col">
            <div class="form-group">
                <label class="text-metal-silver">1. Tu Control</label>
                <select class="metal-dropdown" id="dispositivo"></select>
            </div>

            <div class="form-group">
                <label class="text-metal-silver">2. Tipo de Servicio</label>
                <select class="metal-dropdown" id="servicio"></select>
            </div>

            <div class="precio-container">
                <label class="text-metal-silver" style="font-size: 0.75rem;">Costo Estimado</label>
                <p class="text-metal-red neon-text-red" style="font-size: 1.8rem; font-weight: 900; margin-top: 5px;" id="precioDisplay">$0</p>
            </div>

            <div class="action-buttons">
                <button class="btn-wa" id="btnWhatsapp">
                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
                    Enviar Cotización
                </button>
                
                <button class="btn-secondary" onclick="window.open('https://reparacionescharly.github.io/CotizadorRCharly/', '_self')">
                    🕹️ Cotizador de Consolas
                </button>
                <button class="btn-secondary" onclick="window.open('test.html', '_self')">
                    🎮 Tester de Controles
                </button>
            </div>
        </div>
    </main>

    <div class="info-panel">
        <div class="info-card">
            <h3>📍 Contáctanos</h3>
            <a href="https://maps.app.goo.gl/qxCagrwpNnx39w6V8?g_st=ac" target="_blank">Ver Ubicación en Mapa</a>
            <div class="social-links">
                <a href="https://www.facebook.com/share/1EQq6NiLzx/" target="_blank">Facebook</a>
                <a href="https://www.instagram.com/reparacionescharlyb9?igsh=MXc5d3p0OWVjcDJ2OQ==" target="_blank">Instagram</a>
            </div>
        </div>

        <div class="info-card">
            <h3>💳 Métodos de Pago</h3>
            <p>Aceptamos Mercado Pago</p>
            <p class="pago-numero">722969020254155883</p>
            <p>Carlos Francisco Romero Romero</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const data = {
                "Control Xbox One (Fat/S/X)": [
                    ["Joystick original", 150], ["Joystick TMR", 250], ["Goma conductiva (botones)", 150], 
                    ["D-pad", 150], ["Bumper LB y RB", 250], ["Gatillo hall interno", 250], 
                    ["Gatillo plástico", 150], ["Microswich LB y RB", 250], ["Puerto de carga V8", 280], 
                    ["Jack de auriculares", 200], ["Capuchón original par (gomas)", 60], ["Limpieza profunda", 80], 
                    ["Reparación electrónica", 450], ["Cambio de placa Power", 450], ["Cambio de placa Control", 500], 
                    ["Reparación Bluetooth", 450], ["Reballing Microprocesador", 500]
                ],
                "Control Xbox Series (S/X)": [
                    ["Joystick original", 250], ["Joystick TMR", 350], ["Goma conductiva botones", 250], 
                    ["Bumper LB y RB", 250], ["Microswich LB y RB", 250], ["Gatillo plástico", 150], 
                    ["Gatillo hall interno", 300], ["D-pad", 150], ["Puerto tipo C", 300], 
                    ["Fallas de encendido", 550], ["Cambio de placa Power", 480], ["Cambio de placa joysticks", 600], 
                    ["Fallas de Bluetooth", 450], ["Reballing a microprocesador", 550], ["Capuchon original par (gomas)", 60]
                ],
                "Control Xbox Elite Series 2": [
                    ["Joystick original", 300], ["Joystick TMR", 450], ["Goma conductiva botones", 250], 
                    ["Bumper LB y RB", 250], ["Microswich LB y RB", 250], ["Mantenimiento Completo y Limpieza", 200], 
                    ["Falla en Palancas Traseras (Paddles)", 300]
                ],
                "Control PS4 (DualShock 4)": [
                    ["Joystick", 150], ["Joystick TMR", 250], ["Membrana de botones", 200], 
                    ["Centro de carga tipo C / V8", 200], ["Goma condutivas", 200], ["Gatillo aptico", 450], 
                    ["Flex gatillo", 300], ["Puerto audífonos", 300], ["Pmic", 600], ["Corto en placa", 500]
                ],
                "Control PS5 DualSense": [
                    ["Joystick", 250], ["Joystick TMR", 350], ["Membrana de botones", 250], 
                    ["Goma conductiva", 200], ["Motor adaptativo", 450], ["Motor aptico", 450], 
                    ["Gatillo aptico", 450], ["Flex gatillo", 300], ["Centro de carga tipo C", 300], 
                    ["Jack de audífonos", 300], ["Pmic", 650], ["Corto en placa", 500]
                ],
                "Control PS5 DualSense Edge": [
                    ["Joystick original", 450], ["Joystick TMR", 600], ["Gatillo adaptative", 700], 
                    ["Motor adaptativo", 700], ["Motor haptico", 450], ["Membrana de botones", 500], 
                    ["Jack de audífonos", 450], ["Pmic", 1500]
                ],
                "Nintendo Switch (Joy-Con)": [
                    ["Joystick original", 200], ["Joystick TMR", 350], ["Riel", 200], 
                    ["Flex vinculación inalámbrica", 350], ["Batería", 400]
                ],
                "Nintendo Switch Pro Controller": [
                    ["Joystick original", 300], ["Joystick TMR", 450], ["Puerto de carga", 400], 
                    ["Goma conductiva", 300], ["Corto en placa", 450]
                ]
            };

            const imagenes = {
                "Control Xbox One (Fat/S/X)": "xbox-one.png",
                "Control Xbox Series (S/X)": "xbox-series.png",
                "Control Xbox Elite Series 2": "elite-series-2.png",
                "Control PS4 (DualShock 4)": "dualshock-4.png",
                "Control PS5 DualSense": "dualsense.png",
                "Control PS5 DualSense Edge": "dualsense-edge.png",
                "Nintendo Switch (Joy-Con)": "joycon.png",
                "Nintendo Switch Pro Controller": "pro-controller.png"
            }; 

            const cbDispositivo = document.getElementById("dispositivo");
            const cbServicio = document.getElementById("servicio");
            const imgDisplay = document.getElementById("deviceImg");
            const precioDisplay = document.getElementById("precioDisplay");
            const btnWhatsapp = document.getElementById("btnWhatsapp");

            // Event Listeners
            cbDispositivo.addEventListener("change", cargarServicios);
            cbServicio.addEventListener("change", calcularPrecio);
            btnWhatsapp.addEventListener("click", enviarWhatsApp);

            // Cargar inicial
            let opciones = Object.keys(data);
            for(let i = 0; i < opciones.length; i++) {
                let op = document.createElement("option");
                op.value = opciones[i];
                op.textContent = opciones[i];
                cbDispositivo.appendChild(op);
            }
            cbDispositivo.selectedIndex = 0; 
            cargarServicios();

            function cargarServicios() {
                let disp = cbDispositivo.value;

                imgDisplay.style.opacity = 0;
                setTimeout(() => {
                    imgDisplay.src = imagenes[disp] || "xbox-one.png"; 
                    imgDisplay.style.opacity = 1;
                }, 150);

                cbServicio.innerHTML = "";
                let servicios = data[disp];
                
                for (let i = 0; i < servicios.length; i++) {
                    let op = document.createElement("option");
                    op.value = servicios[i][0];
                    op.textContent = servicios[i][0];
                    cbServicio.appendChild(op);
                }
                
                cbServicio.selectedIndex = 0;
                calcularPrecio();
            }

            function calcularPrecio() {
                let disp = cbDispositivo.value;
                let srv = cbServicio.value;
                
                let servicioData = data[disp].find(s => s[0] === srv);
                
                if (servicioData) {
                    let precio = servicioData[1];
                    if (precio === "Gratis") {
                        precioDisplay.innerText = "Gratis";
                    } else {
                        precioDisplay.innerText = "$" + precio;
                    }
                }
            }

            function enviarWhatsApp(e) {
                e.preventDefault(); 
                
                const dispositivo = cbDispositivo.value;
                const servicio = cbServicio.value;
                const precio = precioDisplay.innerText;
                
                const mensaje = `🎮 XE SERVICIO ELECTRÓNICO\n\n¡Hola! Me gustaría agendar un servicio desde la página web.\n\n🕹 *Mando:* ${dispositivo}\n🔧 *Servicio:* ${servicio}\n💰 *Costo Estimado:* ${precio}`;
                const numero = "523324114355"; 
                
                window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
            }
        });
    </script>
</body>
</html>
